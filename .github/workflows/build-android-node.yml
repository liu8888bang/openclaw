name: 编译OpenClaw安卓纯节点APK
# 支持网页手动一键启动编译
on:
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 新增：6月新版完整编译30分钟封顶
    steps:
      # 1. 拉取源码 v5 官方最新稳定版
      - name: 拉取源码
        uses: actions/checkout@v5

      # 新增：适配2026新版源码必须前置Node22 + pnpm构建跨端依赖
      - name: 安装Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: 安装pnpm & 构建根目录共享模块
        run: |
          corepack enable pnpm
          pnpm install
          pnpm run build

      # 2. JDK17 安卓标准编译环境 setup-java@v5 最新
      - name: 安装JDK17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      # 3. 固定SDK34，匹配2026.6最新源码编译版本
      - name: 部署安卓SDK环境
        uses: android-actions/setup-android@v4
        with:
          api-level: 34
          target-sdk: 34
          build-tools: 34.0.0

      # 4. 编译，增加--no-daemon防止云端卡死，--stacktrace输出报错日志
      - name: 编译APK
        working-directory: ./apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      # 5. 仅编译成功才上传，upload-artifact@v4 稳定通用，保留180天
      - name: 上传APK成品
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-node-debug
          path: apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 180
