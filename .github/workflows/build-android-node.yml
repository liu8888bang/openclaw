name: 编译OpenClaw安卓纯节点APK(通用版)
on:
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取源码
      - name: 拉取源码
        uses: actions/checkout@v5

      # 2. 安装JDK17
      - name: 安装JDK17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      # 3. 部署Android SDK
      - name: 部署安卓SDK环境
        uses: android-actions/setup-android@v4

      # 4. 编译 universal 通用纯净包
      - name: 编译APK
        working-directory: ./apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleUniversalDebug --stacktrace --no-daemon

      # 5. 上传通用包（修正对应路径）
      - name: 上传APK成品
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-universal-node
          path: apps/android/app/build/outputs/apk/universal/debug/*.apk
          retention-days: 180
