name: 编译OpenClaw安卓纯节点APK
on:
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取源码
      - name: 拉取源码
        uses: actions/checkout@v5

      # 2. 安卓编译仅需JDK17，不需要Node/pnpm
      - name: 安装JDK17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      # 3. 部署Android SDK
      - name: 部署安卓SDK环境
        uses: android-actions/setup-android@v4

      # 4. 进入安卓目录赋予权限并编译
      - name: 编译APK
        working-directory: ./apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      # 5. 编译成功上传APK
      - name: 上传APK成品
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-node-debug
          path: apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 180
